<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepCar.vin - Проверка истории автомобиля</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="logo">deepcar.vin</div>
        <div class="language-selector">
            <button class="lang-btn" data-lang="ru">🇷🇺 Русский</button>
            <button class="lang-btn" data-lang="ky">🇰🇬 Кыргызча</button>
            <button class="lang-btn" data-lang="uz">🇺🇿 Ўзбекча</button>
            <button class="lang-btn" data-lang="kk">🇰🇿 Қазақша</button>
        </div>
    </header>

    <main class="main">
        <div class="hero">
            <h1 id="title">Проверка истории автомобиля</h1>
            <p id="subtitle">Узнайте полную историю по VIN номеру</p>
        </div>

        <div class="search-box">
            <div class="input-group">
                <input type="text" id="vinInput" class="vin-input" placeholder="Введите VIN/номер шасси" maxlength="17">
                <button class="camera-btn" id="cameraBtn">📷</button>
            </div>
            <button class="search-btn" id="submitBtn">ПРОВЕРИТЬ</button>
        </div>

        <div class="loading" id="loading" style="display: none;">
            <div class="spinner"></div>
            <p id="loadingText">Проверка...</p>
        </div>

        <div class="results" id="results" style="display: none;">
            <div class="result-grid">
                <div class="card">
                    <span class="icon">🔧</span>
                    <p class="label">ОДОМЕТР</p>
                    <p class="value" id="odometer">71,360</p>
                </div>
                <div class="card">
                    <span class="icon">💥</span>
                    <p class="label">АВАРИИ</p>
                    <p class="value" id="accidents">0</p>
                </div>
                <div class="card">
                    <span class="icon">⚠️</span>
                    <p class="label">ПРОБЛЕМЫ</p>
                    <p class="value" id="problems">0</p>
                </div>
                <div class="card">
                    <span class="icon">💰</span>
                    <p class="label">ПОТЕРЯ</p>
                    <p class="value" id="totalLoss">НЕТ</p>
                </div>
                <div class="card">
                    <span class="icon">🔨</span>
                    <p class="label">УТИЛИЗАЦИЯ</p>
                    <p class="value" id="junk">НЕТ</p>
                </div>
                <div class="card">
                    <span class="icon">📋</span>
                    <p class="label">ДОКУМЕНТЫ</p>
                    <p class="value" id="titles">1</p>
                </div>
                <div class="card">
                    <span class="icon">📊</span>
                    <p class="label">ПРОДАЖИ</p>
                    <p class="value" id="sales">2</p>
                </div>
                <div class="card">
                    <span class="icon">🔔</span>
                    <p class="label">ОТЗЫВЫ</p>
                    <p class="value" id="recalls">0</p>
                </div>
            </div>
        </div>

        <div class="error" id="error" style="display: none;">
            <p id="errorText">Введите корректный VIN (17 символов)</p>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2024 DeepCar.vin</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
